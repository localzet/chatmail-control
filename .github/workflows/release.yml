name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test

  binary-linux-amd64:
    name: binary linux amd64
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare release bundle
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          BUNDLE_DIR="dist/chatmail-control-${VERSION}-linux-amd64-bundle"
          RAW_BINARY="dist/chatmail-control-${VERSION}-linux-amd64"
          mkdir -p "$BUNDLE_DIR"
          cp target/release/chatmail-control "$BUNDLE_DIR/"
          cp README.md config.example.toml .env.example "$BUNDLE_DIR/"
          cp -r migrations templates static systemd "$BUNDLE_DIR/"
          cp scripts/install.sh "dist/install.sh"
          cp scripts/update.sh "dist/update.sh"
          chmod +x "dist/install.sh"
          chmod +x "dist/update.sh"
          cp target/release/chatmail-control "$RAW_BINARY"
          tar -C dist -czf "dist/chatmail-control-${VERSION}-linux-amd64-bundle.tar.gz" "chatmail-control-${VERSION}-linux-amd64-bundle"
          sha256sum "$RAW_BINARY" > "${RAW_BINARY}.sha256"
          sha256sum "dist/chatmail-control-${VERSION}-linux-amd64-bundle.tar.gz" > "dist/chatmail-control-${VERSION}-linux-amd64-bundle.tar.gz.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatmail-control-linux-amd64
          path: dist/*

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/install.sh
            dist/update.sh
            dist/chatmail-control-${{ env.VERSION }}-linux-amd64
            dist/chatmail-control-${{ env.VERSION }}-linux-amd64.sha256
            dist/chatmail-control-${{ env.VERSION }}-linux-amd64-bundle.tar.gz
            dist/chatmail-control-${{ env.VERSION }}-linux-amd64-bundle.tar.gz.sha256
