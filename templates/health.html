{% extends "base.html" %}

{% block content %}
<section class="card">
  <table>
    <thead>
      <tr>
        <th>Check</th>
        <th>Status</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      {% for check in checks %}
      <tr>
        <td>{{ check.name }}</td>
        <td>{{ check.status }}</td>
        <td><pre>{{ check.details }}</pre></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
