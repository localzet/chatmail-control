{% extends "base.html" %}

{% block content %}
<section class="glass-card">
    <form class="grid gap-4 md:grid-cols-4" action="/admin/logs" method="get">
        <label class="text-sm text-slate-300">
            Source
            <select class="form-input" name="source">
                {% for source in sources %}
                <option value="{{ source.name }}" {% if source.selected %}selected{% endif %}>{{ source.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="text-sm text-slate-300">
            Search
            <input id="logs-q" class="form-input" type="text" name="q" value="{{ query }}">
        </label>
        <label class="text-sm text-slate-300">
            Lines
            <input class="form-input" type="number" name="limit" min="10" max="1000" value="{{ limit }}">
        </label>
        <div class="flex items-end">
            <button class="btn btn-primary w-full" type="submit">Refresh</button>
        </div>
    </form>
    <div class="mt-3 flex flex-wrap gap-2">
        <button class="btn btn-soft" type="button" onclick="document.getElementById('logs-q').value='error'; this.closest('section').querySelector('form').submit();">Errors</button>
        <button class="btn btn-soft" type="button" onclick="document.getElementById('logs-q').value='warn'; this.closest('section').querySelector('form').submit();">Warnings</button>
        <button class="btn btn-soft" type="button" onclick="document.getElementById('logs-q').value='reject'; this.closest('section').querySelector('form').submit();">Rejects</button>
        <button class="btn btn-soft" type="button" onclick="document.getElementById('logs-q').value=''; this.closest('section').querySelector('form').submit();">Clear</button>
    </div>
</section>
<section class="glass-card mt-4">
  <pre class="log-view">{% for line in lines %}<span class="log-{{ line.level }}">{{ line.text }}</span>
{% endfor %}</pre>
</section>
{% endblock %}
