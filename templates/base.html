<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} · chatmail-control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                950: "#060b1d",
                900: "#0a1230",
                800: "#10204c",
                700: "#163066",
                500: "#2f72ff"
              }
            },
            boxShadow: {
              glass: "0 18px 60px rgba(4, 8, 24, 0.5)"
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="min-h-screen bg-navy-950 text-slate-100 antialiased">
<div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-24 -left-24 h-96 w-96 rounded-full bg-blue-500/20 blur-3xl animate-float"></div>
    <div class="absolute top-1/2 -right-32 h-[28rem] w-[28rem] rounded-full bg-indigo-400/20 blur-3xl animate-float-slow"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-cyan-400/10 blur-3xl animate-float"></div>
</div>

<div class="mx-auto grid min-h-screen max-w-[1600px] grid-cols-1 gap-5 p-4 lg:grid-cols-[280px_1fr]">
    <aside class="glass-card lg:sticky lg:top-4 lg:h-[calc(100vh-2rem)]">
        <div class="mb-6 border-b border-white/10 pb-4">
            <h1 class="text-xl font-semibold tracking-wide text-slate-100">chatmail-control</h1>
            <p class="mt-2 text-sm text-slate-400">{{ username }}</p>
        </div>
        {% include "partials/nav.html" %}
    </aside>
    <main class="min-w-0 animate-fade-in">
        <header class="mb-5 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 backdrop-blur-xl">
            <h2 class="text-xl font-semibold tracking-wide text-white">{{ page_title }}</h2>
            <div class="flex items-center gap-2">
                <button id="compact-toggle" class="btn btn-soft" type="button">Compact mode</button>
                <form action="/logout" method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button class="btn btn-soft" type="submit">Logout</button>
                </form>
            </div>
        </header>
        {% block content %}{% endblock %}
    </main>
</div>
<script>
(() => {
  const body = document.body;
  const compactKey = "cmControlCompactMode";
  const compactBtn = document.getElementById("compact-toggle");

  function applyCompact(isCompact) {
    body.classList.toggle("compact-mode", isCompact);
    if (compactBtn) {
      compactBtn.textContent = isCompact ? "Comfort mode" : "Compact mode";
    }
  }

  applyCompact(localStorage.getItem(compactKey) === "1");
  if (compactBtn) {
    compactBtn.addEventListener("click", () => {
      const next = !body.classList.contains("compact-mode");
      localStorage.setItem(compactKey, next ? "1" : "0");
      applyCompact(next);
    });
  }

  document.querySelectorAll("[data-filter-target]").forEach((input) => {
    const targetId = input.getAttribute("data-filter-target");
    const table = targetId ? document.getElementById(targetId) : null;
    if (!table) return;
    const rows = Array.from(table.querySelectorAll("tbody tr"));
    const runFilter = () => {
      const query = input.value.trim().toLowerCase();
      rows.forEach((row) => {
        const text = row.textContent.toLowerCase();
        row.style.display = !query || text.includes(query) ? "" : "none";
      });
    };
    input.addEventListener("input", runFilter);
  });
})();
</script>
</body>
</html>
