{% extends "base.html" %}

{% block content %}
<section class="glass-card">
    <div class="flex flex-wrap items-center gap-3">
        <h3 class="text-lg font-semibold text-white">Live Control</h3>
        <button id="refresh-now" class="btn btn-soft" type="button">Refresh now</button>
        <span id="sync-state" class="text-sm text-slate-400">Waiting for first sync...</span>
    </div>
</section>

<section class="glass-card mt-4">
    <h3 class="text-lg font-semibold text-white">Create user</h3>
    <form id="create-user-form" class="mt-4 grid gap-4 md:grid-cols-3">
        <label class="text-sm text-slate-300">
            Email
            <input id="create-user-address" class="form-input mt-1 w-full" type="email" required>
        </label>
        <label class="text-sm text-slate-300">
            Password
            <input id="create-user-password" class="form-input mt-1 w-full" type="text" required>
        </label>
        <div class="flex items-end">
            <button id="create-user-submit" class="btn btn-primary" type="submit">Create user</button>
        </div>
    </form>
</section>

<section class="mt-4 grid gap-4 sm:grid-cols-3">
    <article class="glass-card metric-card">
        <h4 class="text-sm font-medium text-slate-400">Mailboxes</h4>
        <strong id="metric-users" class="mt-2 block text-3xl font-semibold text-white">-</strong>
    </article>
    <article class="glass-card metric-card">
        <h4 class="text-sm font-medium text-slate-400">Active bans</h4>
        <strong id="metric-bans" class="mt-2 block text-3xl font-semibold text-white">-</strong>
    </article>
    <article class="glass-card metric-card">
        <h4 class="text-sm font-medium text-slate-400">Mail queue</h4>
        <strong id="metric-queue" class="mt-2 block text-3xl font-semibold text-white">-</strong>
    </article>
</section>

<section class="glass-card mt-4">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <h3 class="text-lg font-semibold text-white">Users (live)</h3>
        <input id="users-filter" class="form-input max-w-sm" type="text" placeholder="Filter by email">
    </div>
    <div class="mt-3 overflow-x-auto">
        <table class="data-table w-full text-sm">
            <thead>
                <tr class="border-b border-white/10 text-left text-xs uppercase tracking-wider text-slate-400">
                    <th class="px-3 py-2">Address</th>
                    <th class="px-3 py-2">Status</th>
                    <th class="px-3 py-2">Mailbox size</th>
                    <th class="px-3 py-2">Messages</th>
                    <th class="px-3 py-2">Last seen</th>
                    <th class="px-3 py-2">Actions</th>
                </tr>
            </thead>
            <tbody id="users-live-body"></tbody>
        </table>
    </div>
</section>

<section class="glass-card mt-4">
    <h3 class="text-lg font-semibold text-white">Warnings</h3>
    <ul id="warnings-live" class="mt-3 space-y-2"></ul>
</section>

<script>
window.__cmCsrfToken = "{{ csrf_token }}";
</script>
<script src="/static/admin-app.js"></script>
{% endblock %}
